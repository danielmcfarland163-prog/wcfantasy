name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # Use `npm install` (not `npm ci`) so the job self-reconciles if the
      # lockfile hasn't been regenerated after a package.json change yet.
      - run: npm install

      - name: Unit tests (scoring engines)
        run: npm test
