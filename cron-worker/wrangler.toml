name = "soccer-fantasy-cron"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# Cron schedules — each maps to an ordered step list in src/index.ts (SCHEDULES).
#   */5  → sync-scores  → score-picks      (live scores + score finished matches)
#   0 */6 → sync-fixtures → score-bracket  (pick up knockouts + rescore brackets)
#   0 18 → notify-picks-reminder           (daily reminder email, 18:00 UTC)
[triggers]
crons = ["*/5 * * * *", "0 */6 * * *", "0 18 * * *"]

# Secrets (set via `wrangler secret put`):
#   CRON_SECRET   — must match the app's runtime env var
#   APP_URL       — https://www.garageapothecary.com/soccer-fantasy  (INCLUDE the basePath)
